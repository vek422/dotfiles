
# Base Rules - Updated for Hyprland 0.53.3 syntax

# Center float large (qimgv, mpv)
windowrule = float on, match:class ^(center-float-large)$|^(.*qimgv.*)$|^(.*mpv.*)$
windowrule = size 70% 70%, match:class ^(center-float-large)$|^(.*qimgv.*)$|^(.*mpv.*)$
windowrule = center on, match:class ^(center-float-large)$|^(.*qimgv.*)$|^(.*mpv.*)$

# Center float (file dialogs)
windowrule = float on, match:class ^(center-float)$
windowrule = float on, match:title ^(.*Open Folder.*)$|^(.*Open File.*)$|^(.*Save File.*)$|^(.*Save Folder.*)$|^(.*Save Image.*)$|^(.*Save As.*)$|^(.*Open As.*)$
windowrule = size 50% 50%, match:class ^(center-float)$
windowrule = size 50% 50%, match:title ^(.*Open Folder.*)$|^(.*Open File.*)$|^(.*Save File.*)$|^(.*Save Folder.*)$|^(.*Save Image.*)$|^(.*Save As.*)$|^(.*Open As.*)$
windowrule = center on, match:class ^(center-float)$
windowrule = center on, match:title ^(.*Open Folder.*)$|^(.*Open File.*)$|^(.*Save File.*)$|^(.*Save Folder.*)$|^(.*Save Image.*)$|^(.*Save As.*)$|^(.*Open As.*)$

# Center float mini (calculators, small apps)
windowrule = float on, match:class ^(center-float-mini)$|^(.*galculator.*)$|^(.*ytdlp-gui.*)$|^(.*udiskie.*)$|^(.*Calculator.*)$
windowrule = size 30% 40%, match:class ^(center-float-mini)$|^(.*galculator.*)$|^(.*ytdlp-gui.*)$|^(.*udiskie.*)$|^(.*Calculator.*)$
windowrule = center on, match:class ^(center-float-mini)$|^(.*galculator.*)$|^(.*ytdlp-gui.*)$|^(.*udiskie.*)$|^(.*Calculator.*)$

